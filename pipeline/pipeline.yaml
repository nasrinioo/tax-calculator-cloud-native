apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: tax-calculator-pipeline
spec:
  workspaces:
    - name: shared-workspace
  tasks:
    - name: install-dependencies
      taskRef:
        name: npm
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: run-unit-tests
      taskRef:
        name: jasmine
      runAfter:
        - install-dependencies
      workspaces:
        - name: source
          workspace: shared-workspace

    - name: build-application
      runAfter:
        - run-unit-tests
      workspaces:
        - name: source
          workspace: shared-workspace
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: build
            image: node:18
            workingDir: $(workspaces.source.path)
            script: |
              #!/bin/sh
              npm run build
